%YAML:1.0

# Engcang Kalibr test config for D435i stereo-IMU.
# Test-only. Do not treat this as final calibration for this physical camera.

# common parameters
imu: 1
num_of_cam: 2

imu_topic: "/camera/imu"
image0_topic: "/camera/infra1/image_rect_raw"
image1_topic: "/camera/infra2/image_rect_raw"

output_path: "/work/output/engcang_test/"

cam0_calib: "left_engcang.yaml"
cam1_calib: "right_engcang.yaml"

image_width: 640
image_height: 480

# Extrinsic parameter between IMU and cameras.
# Test Engcang Kalibr result directly.
# body_T_cam is treated here as camera pose in IMU/body frame.
estimate_extrinsic: 0

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -0.00407513, -0.0060896, 0.99997315, -0.00071836,
       -0.99999052, -0.00150888, -0.00408439, 0.00235801,
       0.00153372, -0.99998032, -0.00608339, -0.01569216,
       0.0, 0.0, 0.0, 1.0 ]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ -0.00256499, -0.00633838, 0.99997662, -0.0008448,
       -0.99999516, -0.00174356, -0.00257608, -0.04728805,
       0.00175985, -0.99997839, -0.00633388, -0.01556804,
       0.0, 0.0, 0.0, 1.0 ]

# Multiple thread support
multiple_thread: 1

# feature tracker parameters
max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 0
flow_back: 1

# optimization parameters
max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

# IMU parameters from Engcang D435i Kalibr files
acc_n: 0.001865
gyr_n: 0.0018685
acc_w: 0.0002
gyr_w: 0.000004
g_norm: 9.805

# Time offset.
# Keep online time offset estimation enabled for the first test because this machine uses
# librealsense v2.56.5 + RSUSB + realsense-ros ros1-legacy, not necessarily the same stack
# used by Engcang.
estimate_td: 1
td: 0.0

# loop closure parameters
load_previous_pose_graph: 0
pose_graph_save_path: "/work/output/engcang_test/pose_graph/"
save_image: 0
